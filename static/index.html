<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logic Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #e5e7eb; font-family: 'Inter', sans-serif; }
        .card { background-color: #1e1e1e; border: 1px solid #333; transition: transform 0.1s; }
        .collapse-content { display: block; overflow: hidden; }
        .collapsed .collapse-content { display: none; }
        .rotate-icon { transition: transform 0.2s; transform: rotate(0deg); }
        .collapsed .rotate-icon { transform: rotate(-90deg); }
        .btn { transition: all 0.2s; cursor: pointer; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.5rem; }
        .progress-segment { transition: width 0.5s ease-in-out; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <div class="flex flex-col gap-6 bg-[#1e1e1e] p-6 rounded-lg border border-gray-800 shadow-2xl mb-8">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <div>
                    <h1 class="text-3xl font-bold tracking-tight bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">Logic Tracker</h1>
                    <p id="status-text" class="text-xs text-gray-500 mt-1 uppercase tracking-widest">Initializing...</p>
                </div>
                <div class="flex flex-wrap justify-center gap-3">
                    <button onclick="globalAction('refresh')" class="btn bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-md text-sm font-semibold shadow-lg">Refresh All</button>
                    <button onclick="globalAction('super')" class="btn bg-purple-600 hover:bg-purple-500 px-4 py-2 rounded-md text-sm font-semibold shadow-lg">Super Refresh</button>
                </div>
            </div>

            <div class="relative">
                <input type="text" id="global-search" oninput="handleSearch()" placeholder="Search items or locations (e.g., 'bag apple')..." 
                    class="w-full bg-black/40 border border-gray-700 rounded-lg py-3 px-11 text-sm focus:outline-none focus:border-blue-500 transition-colors text-gray-200">
                <svg class="w-5 h-5 absolute left-4 top-3.5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
        </div>

        <div id="game-container" class="space-y-6">
            <div class="flex justify-center p-12">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500"></div>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_PREFIX = "logic_v2_";
        const STATUS_EL = document.getElementById('status-text');
        const SEARCH_EL = document.getElementById('global-search');
        let CURRENT_DATA = {};
        let SEARCH_QUERY = "";

        /**
         * API & Actions
         */
        async function triggerAction(type, gameName) {
            const encodedName = encodeURIComponent(gameName);
            const endpoint = type === 'super' ? `/super_refresh/${encodedName}` : `/refresh_tracker/${encodedName}`;
            updateStatus(`Queuing ${type} for ${gameName}...`, "text-yellow-500");
            try {
                const response = await fetch(endpoint);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                updateStatus(`Queued: ${gameName}`, "text-green-500");
            } catch (err) {
                updateStatus(`Failed: ${gameName}`, "text-red-500");
            }
        }

        async function globalAction(type) {
            const games = Object.keys(CURRENT_DATA);
            for (const name of games) await triggerAction(type, name);
        }

        async function fetchData() {
            try {
                const response = await fetch('/games');
                const data = await response.json();
                CURRENT_DATA = data;
                render();
                updateStatus(`Last Updated: ${new Date().toLocaleTimeString()}`);
            } catch (err) {
                updateStatus("Connection Error", "text-red-500");
            }
        }

        function handleSearch() {
            SEARCH_QUERY = SEARCH_EL.value.toLowerCase();
            render();
        }

        /**
         * UI Helpers
         */
        function updateStatus(msg, colorClass = "text-gray-500") {
            STATUS_EL.textContent = msg;
            STATUS_EL.className = `text-xs mt-1 uppercase tracking-widest ${colorClass}`;
        }

        function toggleCollapse(id) {
            const element = document.getElementById(id);
            const isCollapsed = element.classList.toggle('collapsed');
            localStorage.setItem(STORAGE_PREFIX + id, isCollapsed);
        }

        function isCollapsed(id) {
            const stored = localStorage.getItem(STORAGE_PREFIX + id);
            return stored === null ? false : stored === 'true';
        }

        /**
         * Filtering Logic
         */
        function matchesSearch(text) {
            if (!SEARCH_QUERY) return true;
            const words = SEARCH_QUERY.split(/\s+/).filter(w => w.length > 0);
            const lowerText = text.toLowerCase();
            return words.every(word => lowerText.includes(word));
        }

        /**
         * Rendering
         */
        function render() {
            const container = document.getElementById('game-container');
            container.innerHTML = "";

            if (Object.keys(CURRENT_DATA).length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-gray-600 italic">No active games found.</div>`;
                return;
            }

            for (const [gameName, gamePlayers] of Object.entries(CURRENT_DATA)) {
                const gameId = `g_${btoa(gameName).replace(/[^a-z0-9]/gi, '')}`;
                const playerHTML = renderPlayers(gameName, gamePlayers);
                
                // If search query active and no players/locations match, hide the game entirely
                if (SEARCH_QUERY && playerHTML.trim() === "") continue;

                const gameSection = document.createElement('div');
                gameSection.id = gameId;
                gameSection.className = `card rounded-xl shadow-lg overflow-hidden mb-6 ${isCollapsed(gameId) ? 'collapsed' : ''}`;
                gameSection.innerHTML = `
                    <div class="flex flex-wrap items-center justify-between p-4 bg-[#252525] border-b border-gray-800">
                        <div class="flex items-center cursor-pointer flex-grow min-w-[200px]" onclick="toggleCollapse('${gameId}')">
                            <svg class="rotate-icon w-6 h-6 mr-3 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            <h2 class="text-xl font-bold text-white">${gameName}</h2>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="triggerAction('refresh', '${gameName.replace(/'/g, "\\'")}')" class="btn text-xs bg-gray-700 hover:bg-gray-600 px-3 py-1.5 rounded font-medium">Refresh</button>
                        </div>
                    </div>
                    <div class="collapse-content p-4 space-y-6 bg-[#1a1a1a]">${playerHTML}</div>
                `;
                container.appendChild(gameSection);
            }
        }

        function renderPlayers(gameName, players) {
            return Object.entries(players).map(([playerName, pData]) => {
                const playerId = `p_${btoa(gameName + playerName).replace(/[^a-z0-9]/gi, '')}`;
                
                // Filter content
                const filteredLocations = pData.in_logic.filter(loc => matchesSearch(loc));
                const filteredItems = Object.entries(pData.items).filter(([name]) => matchesSearch(name));

                // If searching and nothing matches for this player, skip them
                if (SEARCH_QUERY && filteredLocations.length === 0 && filteredItems.length === 0) return '';

                const donePct = (pData.num_locations_checked / pData.num_locations_total) * 100;
                const doablePct = (pData.in_logic.length / pData.num_locations_total) * 100;

                return `
                    <div class="border border-gray-800 rounded-lg overflow-hidden bg-black/10 ${isCollapsed(playerId) ? 'collapsed' : ''}" id="${playerId}">
                        <div class="flex flex-col p-4 bg-gray-800/30 hover:bg-gray-800/40 transition-colors cursor-pointer" onclick="toggleCollapse('${playerId}')">
                            <div class="flex items-center justify-between mb-3">
                                <div class="flex flex-col">
                                    <div class="flex items-center">
                                        <svg class="rotate-icon w-3 h-3 mr-2 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                        <span class="font-bold text-gray-100">${playerName}</span>
                                    </div>
                                    <span class="text-[9px] text-gray-500 uppercase ml-5 tracking-wider">Last Activity: ${pData.last_activity || 'Unknown'}</span>
                                </div>
                                <div class="text-xs font-mono text-gray-400">
                                    <span class="text-green-500">${pData.num_locations_checked}</span> / 
                                    <span class="text-yellow-500">${pData.in_logic.length}</span> / 
                                    <span class="text-gray-500">${pData.num_locations_total}</span>
                                </div>
                            </div>
                            <div class="w-full h-2 bg-gray-800 rounded-full flex overflow-hidden border border-gray-700/50">
                                <div class="progress-segment bg-green-500 h-full" style="width: ${donePct}%"></div>
                                <div class="progress-segment bg-yellow-500 h-full" style="width: ${doablePct}%"></div>
                            </div>
                        </div>

                        <div class="collapse-content border-t border-gray-800/50">
                            <div class="grid grid-cols-1 lg:grid-cols-2 divide-y lg:divide-y-0 lg:divide-x divide-gray-800">
                                <div class="p-4">
                                    <h4 class="text-[9px] uppercase tracking-widest text-yellow-500 font-bold mb-3">Locations</h4>
                                    <div class="grid-layout">
                                        ${filteredLocations.length > 0 
                                            ? filteredLocations.map(loc => `<div class="text-[11px] text-gray-400 truncate hover:text-yellow-400">• ${loc}</div>`).join('')
                                            : `<div class="text-gray-600 text-[11px] italic">${SEARCH_QUERY ? 'No matches' : 'None reachable'}</div>`
                                        }
                                    </div>
                                </div>
                                <div class="p-4 bg-black/20">
                                    <h4 class="text-[9px] uppercase tracking-widest text-blue-400 font-bold mb-3">Inventory</h4>
                                    <div class="grid-layout">
                                        ${filteredItems.length > 0 
                                            ? filteredItems.map(([name, count]) => `
                                                <div class="flex justify-between items-center bg-gray-800/40 rounded px-2 py-1 border border-gray-700/30 text-[11px]">
                                                    <span class="text-gray-300 truncate">${name}</span>
                                                    <span class="text-blue-400 ml-1">x${count}</span>
                                                </div>`).join('')
                                            : `<div class="text-gray-600 text-[11px] italic">${SEARCH_QUERY ? 'No matches' : 'Empty'}</div>`
                                        }
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        fetchData();
        setInterval(fetchData, 60000); 
    </script>
</body>
</html>
