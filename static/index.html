<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logic Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #e5e7eb; font-family: 'Inter', sans-serif; }
        .card { background-color: #1e1e1e; border: 1px solid #333; transition: transform 0.1s; }
        .collapse-content { display: block; overflow: hidden; }
        .collapsed .collapse-content { display: none; }
        .rotate-icon { transition: transform 0.2s; transform: rotate(0deg); }
        .collapsed .rotate-icon { transform: rotate(-90deg); }
        .btn { transition: all 0.2s; cursor: pointer; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.5rem; }
        
        /* Progress Bar Smoothing */
        .progress-segment { transition: width 0.5s ease-in-out; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-6 bg-[#1e1e1e] p-6 rounded-lg border border-gray-800 shadow-2xl">
            <div>
                <h1 class="text-3xl font-bold tracking-tight bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">Logic Tracker</h1>
                <p id="status-text" class="text-xs text-gray-500 mt-1 uppercase tracking-widest">Initializing...</p>
            </div>
            <div class="flex flex-wrap justify-center gap-3">
                <button onclick="globalAction('refresh')" class="btn bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-md text-sm font-semibold shadow-lg">Refresh All Trackers</button>
                <button onclick="globalAction('super')" class="btn bg-purple-600 hover:bg-purple-500 px-4 py-2 rounded-md text-sm font-semibold shadow-lg">Super Refresh All</button>
            </div>
        </div>

        <div id="game-container" class="space-y-6">
            <div class="flex justify-center p-12">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500"></div>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_PREFIX = "logic_v2_";
        const STATUS_EL = document.getElementById('status-text');
        let CURRENT_DATA = {};

        /**
         * API Interaction
         */
        async function triggerAction(type, gameName) {
            const encodedName = encodeURIComponent(gameName);
            const endpoint = type === 'super' ? `/super_refresh/${encodedName}` : `/refresh_tracker/${encodedName}`;
            
            updateStatus(`Queuing ${type} for ${gameName}...`, "text-yellow-500");
            try {
                const response = await fetch(endpoint);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                updateStatus(`Queued: ${gameName}`, "text-green-500");
            } catch (err) {
                console.error(err);
                updateStatus(`Failed to queue ${gameName}`, "text-red-500");
            }
        }

        async function globalAction(type) {
            const games = Object.keys(CURRENT_DATA);
            if (games.length === 0) return;
            
            updateStatus(`Batching ${type} for all games...`, "text-blue-400");
            for (const name of games) {
                await triggerAction(type, name);
            }
        }

        async function fetchData() {
            try {
                // Assuming the API returns the format: { Game: { Player: { stats } } }
                const response = await fetch('/games');
                const data = await response.json();
                CURRENT_DATA = data;
                render(data);
                updateStatus(`Last Updated: ${new Date().toLocaleTimeString()}`);
            } catch (err) {
                console.error(err);
                updateStatus("Connection Error", "text-red-500");
            }
        }

        /**
         * UI State Management
         */
        function updateStatus(msg, colorClass = "text-gray-500") {
            STATUS_EL.textContent = msg;
            STATUS_EL.className = `text-xs mt-1 uppercase tracking-widest ${colorClass}`;
        }

        function toggleCollapse(id) {
            const element = document.getElementById(id);
            const isCollapsed = element.classList.toggle('collapsed');
            localStorage.setItem(STORAGE_PREFIX + id, isCollapsed);
        }

        function isCollapsed(id) {
            const stored = localStorage.getItem(STORAGE_PREFIX + id);
            return stored === null ? false : stored === 'true';
        }

        /**
         * Rendering Logic
         */
        function render(data) {
            const container = document.getElementById('game-container');
            container.innerHTML = "";

            if (Object.keys(data).length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-gray-600 italic">No active games found in logic.</div>`;
                return;
            }

            for (const [gameName, gamePlayers] of Object.entries(data)) {
                const gameId = `g_${btoa(gameName).replace(/[^a-z0-9]/gi, '')}`;
                const gameCollapsed = isCollapsed(gameId);

                const gameSection = document.createElement('div');
                gameSection.id = gameId;
                gameSection.className = `card rounded-xl shadow-lg overflow-hidden mb-6 ${gameCollapsed ? 'collapsed' : ''}`;

                gameSection.innerHTML = `
                    <div class="flex flex-wrap items-center justify-between p-4 bg-[#252525] border-b border-gray-800">
                        <div class="flex items-center cursor-pointer flex-grow min-w-[200px]" onclick="toggleCollapse('${gameId}')">
                            <svg class="rotate-icon w-6 h-6 mr-3 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            <h2 class="text-xl font-bold text-white">${gameName}</h2>
                        </div>
                        <div class="flex gap-2 mt-2 md:mt-0">
                            <button onclick="triggerAction('refresh', '${gameName.replace(/'/g, "\\'")}')" class="btn text-xs bg-gray-700 hover:bg-gray-600 px-3 py-1.5 rounded font-medium">Refresh</button>
                            <button onclick="triggerAction('super', '${gameName.replace(/'/g, "\\'")}')" class="btn text-xs bg-red-900/40 hover:bg-red-900/60 text-red-200 px-3 py-1.5 rounded font-medium border border-red-800/50">Super Refresh</button>
                        </div>
                    </div>
                    <div class="collapse-content p-4 space-y-6 bg-[#1a1a1a]">
                        ${renderPlayers(gameName, gamePlayers)}
                    </div>
                `;
                container.appendChild(gameSection);
            }
        }

        function renderPlayers(gameName, players) {
            return Object.entries(players).map(([playerName, pData]) => {
                const playerId = `p_${btoa(gameName + playerName).replace(/[^a-z0-9]/gi, '')}`;
                const playerCollapsed = isCollapsed(playerId);

                // Math for Progress Bar
                const donePct = (pData.num_locations_checked / pData.num_locations_total) * 100;
                const doablePct = (pData.in_logic.length / pData.num_locations_total) * 100;
                
                return `
                    <div class="border border-gray-800 rounded-lg overflow-hidden shadow-sm bg-black/10 ${playerCollapsed ? 'collapsed' : ''}" id="${playerId}">
                        <div class="flex flex-col p-4 bg-gray-800/30 hover:bg-gray-800/40 transition-colors cursor-pointer" onclick="toggleCollapse('${playerId}')">
                            <div class="flex items-center justify-between mb-3">
                                <div class="flex items-center">
                                    <svg class="rotate-icon w-4 h-4 mr-2 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                    <span class="font-bold text-lg text-gray-100">${playerName}</span>
                                </div>
                                <div class="text-xs font-mono text-gray-400">
                                    <span class="text-green-500">${pData.num_locations_checked}</span> / 
                                    <span class="text-yellow-500">${pData.in_logic.length}</span> / 
                                    <span class="text-gray-500">${pData.num_locations_total}</span>
                                </div>
                            </div>
                            
                            <div class="w-full h-2.5 bg-gray-800 rounded-full flex overflow-hidden border border-gray-700/50">
                                <div class="progress-segment bg-green-500 h-full shadow-[0_0_10px_rgba(34,197,94,0.3)]" style="width: ${donePct}%"></div>
                                <div class="progress-segment bg-yellow-500 h-full shadow-[0_0_10px_rgba(234,179,8,0.3)]" style="width: ${doablePct}%"></div>
                            </div>
                        </div>

                        <div class="collapse-content border-t border-gray-800/50">
                            <div class="grid grid-cols-1 lg:grid-cols-2 divide-y lg:divide-y-0 lg:divide-x divide-gray-800">
                                <div class="p-4">
                                    <h4 class="text-[10px] uppercase tracking-widest text-yellow-500 font-bold mb-3 flex items-center">
                                        <span class="w-2 h-2 bg-yellow-500 rounded-full mr-2"></span> Reachable Locations
                                    </h4>
                                    <div class="grid-layout">
                                        ${pData.in_logic.length > 0 
                                            ? pData.in_logic.map(loc => `
                                                <div class="flex items-start text-xs text-gray-400 group">
                                                    <span class="w-1 h-1 mt-1.5 bg-gray-600 rounded-full mr-2 shrink-0"></span>
                                                    <span class="leading-tight group-hover:text-yellow-400 transition-colors">${loc}</span>
                                                </div>`).join('')
                                            : '<div class="text-gray-600 text-xs italic">No locations in logic.</div>'
                                        }
                                    </div>
                                </div>

                                <div class="p-4 bg-black/20">
                                    <h4 class="text-[10px] uppercase tracking-widest text-blue-400 font-bold mb-3 flex items-center">
                                        <span class="w-2 h-2 bg-blue-500 rounded-full mr-2"></span> Inventory
                                    </h4>
                                    <div class="grid-layout">
                                        ${Object.entries(pData.items).length > 0 
                                            ? Object.entries(pData.items).map(([itemName, count]) => `
                                                <div class="flex justify-between items-center bg-gray-800/40 rounded px-2 py-1 border border-gray-700/30">
                                                    <span class="text-xs text-gray-300 truncate mr-2">${itemName}</span>
                                                    <span class="text-[10px] font-bold bg-blue-500/20 text-blue-400 px-1.5 py-0.5 rounded">x${count}</span>
                                                </div>`).join('')
                                            : '<div class="text-gray-600 text-xs italic">No items collected.</div>'
                                        }
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        /**
         * Init
         */
        fetchData();
        setInterval(fetchData, 60000); 
    </script>
</body>
</html>
