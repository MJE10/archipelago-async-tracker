<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logic Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0a0a0c; color: #e5e7eb; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .card { 
            background-color: #16161a; 
            border: 1px solid #2d2d35; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .card:hover { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.1); }

        .collapse-wrapper {
            display: grid;
            grid-template-rows: 1fr;
            transition: grid-template-rows 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s ease;
            opacity: 1;
        }
        .collapsed .collapse-wrapper {
            grid-template-rows: 0fr;
            opacity: 0;
            pointer-events: none;
        }
        .collapse-inner { overflow: hidden; }

        .rotate-icon { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); transform: rotate(0deg); }
        .collapsed .rotate-icon { transform: rotate(-90deg); }

        .btn { transition: all 0.2s; cursor: pointer; border-radius: 0.5rem; }
        .btn:active { transform: scale(0.95); }
        
        .tab-btn { border-bottom: 2px solid transparent; transition: all 0.2s; }
        .tab-btn.active { border-color: #3b82f6; color: #3b82f6; background: rgba(59, 130, 246, 0.1); }
        
        /* Strict Font Size Definitions */
        .f-14 { font-size: 14px !important; }
        .f-12 { font-size: 12px !important; }
        .f-10 { font-size: 10px !important; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0c; }
        ::-webkit-scrollbar-thumb { background: #2d2d35; border-radius: 4px; }
    </style>
</head>
<body class="p-2 md:p-8">

    <div class="max-w-6xl mx-auto">
        <div class="sticky top-0 z-50 bg-[#0a0a0c]/80 backdrop-blur-xl pb-4 pt-2">
            <div class="flex flex-col gap-4 bg-[#16161a]/90 p-4 md:p-6 rounded-2xl border border-white/5 shadow-2xl">
                <div class="flex flex-row justify-between items-center">
                    <div class="flex items-center gap-6">
                        <a href="logic-edit://open" class="pr-4">
                            <h1 class="f-24 md:text-3xl font-bold tracking-tight bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">Logic Tracker</h1>
                        </a>
                        <a href="logic-edit://open" class="hidden md:inline-block f-12 text-blue-400/70 hover:text-blue-400 transition-colors border border-blue-500/20 px-3 py-1 rounded-full uppercase font-bold tracking-widest bg-blue-500/5">Edit Config</a>
                    </div>
                    <div class="flex gap-3">
                        <button onclick="collapseAll()" class="btn border border-gray-700 hover:bg-gray-800 px-4 py-2 f-12 font-bold text-gray-400 uppercase tracking-wider">Collapse All</button>
                        <button onclick="globalAction('refresh')" class="btn bg-blue-600 hover:bg-blue-500 px-4 py-2 f-12 font-bold text-white uppercase tracking-wider shadow-[0_0_20px_rgba(37,99,235,0.3)]">Refresh All</button>
                    </div>
                </div>

                <div class="relative">
                    <input type="text" id="global-search" oninput="handleSearch()" placeholder="Search items, locations, or players..." 
                        class="w-full bg-black/60 border border-white/10 rounded-xl py-3 px-12 f-12 focus:outline-none focus:border-blue-500 text-gray-200 transition-all focus:ring-4 focus:ring-blue-500/10">
                    <svg class="w-5 h-5 absolute left-4 top-3.5 text-blue-500/50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
            </div>
        </div>

        <div id="game-container" class="space-y-6 mt-6 pb-20">
            <div class="flex justify-center p-12"><div class="animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-blue-500"></div></div>
        </div>
    </div>

    <script>
        const STORAGE_PREFIX = "logic_v10_";
        const SEARCH_EL = document.getElementById('global-search');
        let CURRENT_DATA = {};
        let SEARCH_QUERY = "";
        let PLAYER_TABS = {}; 

        function formatActivityDate(gmtString) {
            if (!gmtString) return "No activity";
            try {
                const date = new Date(gmtString);
                const now = new Date();
                
                // Normalize dates to midnight for accurate day comparison
                const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                const yesterday = new Date(today);
                yesterday.setDate(yesterday.getDate() - 1);
                const activityDate = new Date(date.getFullYear(), date.getMonth(), date.getDate());

                let datePart;
                if (activityDate.getTime() === today.getTime()) {
                    datePart = "Today";
                } else if (activityDate.getTime() === yesterday.getTime()) {
                    datePart = "Yesterday";
                } else {
                    datePart = date.toLocaleDateString();
                }

                // 'hour: numeric' removes leading zeros (e.g., 9:00 instead of 09:00)
                const timePart = date.toLocaleTimeString([], { 
                    hour: 'numeric', 
                    minute: '2-digit', 
                    hour12: true 
                });

                return `Last activity: ${datePart} ${timePart}`;
            } catch (e) { 
                return gmtString; 
            }
        }

        function getDeadlineCountdown(dateStr) {
            if (!dateStr) return null;
            try {
                const d = new Date(dateStr.replace(/\//g, '-'));
                const now = new Date();
                const diff = d - now;
                if (diff <= 0) return "EXPIRED";
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
                const mins = Math.floor((diff / 1000 / 60) % 60);
                return days > 0 ? `${days}D ${hours}H` : `${hours}H ${Mins}M`;
            } catch (e) { return null; }
        }

        async function fetchData() {
            try {
                const response = await fetch('/games');
                CURRENT_DATA = await response.json();
                render();
            } catch (err) { }
        }

        async function globalAction(action) {
            if (action === 'refresh') {
                try {
                    const response = await fetch('/refresh_all');
                    if (response.ok) await fetchData();
                } catch (err) { }
            }
        }

        function handleSearch() { SEARCH_QUERY = SEARCH_EL.value.toLowerCase(); render(); }
        function collapseAll() { document.querySelectorAll('[id^="g_"], [id^="p_"]').forEach(el => { el.classList.add('collapsed'); localStorage.setItem(STORAGE_PREFIX + el.id, 'true'); }); }
        function toggleCollapse(id) { const element = document.getElementById(id); const isCollapsed = element.classList.toggle('collapsed'); localStorage.setItem(STORAGE_PREFIX + id, isCollapsed); }
        function isCollapsed(id) { const stored = localStorage.getItem(STORAGE_PREFIX + id); return stored === null ? false : stored === 'true'; }
        function matchesSearch(text) { if (!SEARCH_QUERY) return true; return SEARCH_QUERY.split(/\s+/).every(word => text.toLowerCase().includes(word)); }

        function render() {
            const container = document.getElementById('game-container');
            if (!container) return;
            container.innerHTML = "";

            for (const [gameName, gameData] of Object.entries(CURRENT_DATA)) {
                const settings = gameData.settings || {};
                const players = gameData.players || null;
                const gameId = `g_${btoa(gameName).replace(/[^a-z0-9]/gi, '')}`;
                const deadlineText = getDeadlineCountdown(settings.deadline);
                const playerHTML = players && settings.link ? renderPlayers(gameName, players) : "";

                if (SEARCH_QUERY && !matchesSearch(gameName) && playerHTML.trim() === "") continue;

                const section = document.createElement('div');
                section.id = gameId;
                section.className = `card rounded-2xl overflow-hidden mb-6 ${isCollapsed(gameId) ? 'collapsed' : ''}`;
                
                section.innerHTML = `
                    <div class="flex items-center p-4 bg-white/5 cursor-pointer hover:bg-white/10 transition-all gap-4" onclick="toggleCollapse('${gameId}')">
                        <svg class="rotate-icon w-5 h-5 text-blue-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        
                        <div class="flex flex-wrap items-center gap-3 min-w-0">
                            <h2 class="f-14 font-bold text-white tracking-tight">${gameName}</h2>
                            
                            ${settings.status ? `<span class="inline-flex items-center px-2.5 py-0.5 rounded-md f-10 bg-blue-500/20 text-blue-300 border border-blue-500/30 font-bold uppercase tracking-widest h-5">${settings.status}</span>` : ''}
                            ${deadlineText ? `<span class="inline-flex items-center px-2.5 py-0.5 rounded-md f-10 bg-purple-500/20 text-purple-300 border border-purple-500/30 font-mono font-bold h-5 uppercase tracking-tight">${deadlineText}</span>` : ''}
                            
                            <div class="hidden md:flex items-center gap-4 ml-2">
                                ${settings.links ? Object.entries(settings.links).map(([label, url]) => `
                                    <a href="${url}" target="_blank" onclick="event.stopPropagation()" class="f-12 text-blue-400/60 hover:text-blue-300 flex items-center gap-1 transition-colors font-bold uppercase tracking-tighter hover:underline">
                                        ${label} ↗
                                    </a>
                                `).join('') : ''}
                            </div>
                        </div>
                    </div>
                    
                    <div class="collapse-wrapper">
                        <div class="collapse-inner p-4 bg-black/40 border-t border-white/5">
                            ${settings.description ? `<p class="f-12 text-gray-400 mb-6 leading-relaxed italic border-l-2 border-blue-500/40 pl-4">${settings.description}</p>` : ''}
                            <div class="space-y-4">${playerHTML || '<div class="text-center py-8 text-gray-600 f-12 uppercase tracking-widest italic">Waiting for session data...</div>'}</div>
                        </div>
                    </div>
                `;
                container.appendChild(section);
            }
        }

        function renderPlayers(gameName, players) {
            return Object.entries(players).map(([playerName, pData]) => {
                const playerId = `p_${btoa(gameName + playerName).replace(/[^a-z0-9]/gi, '')}`;
                const activeTab = PLAYER_TABS[playerId] || 'locations';
                const playerLink = pData.ut_link || "#"; 
                
                const filteredLocs = (pData.in_logic || []).filter(loc => matchesSearch(loc));
                const sortedItems = Object.entries(pData.items || {})
                    .filter(([name]) => matchesSearch(name))
                    .sort((a, b) => (b[1] !== a[1]) ? b[1] - a[1] : a[0].localeCompare(b[0]));

                if (SEARCH_QUERY && !matchesSearch(playerName) && filteredLocs.length === 0 && sortedItems.length === 0) return '';

                const donePct = (pData.num_locations_checked / pData.num_locations_total) * 100 || 0;
                const doablePct = (filteredLocs.length / pData.num_locations_total) * 100 || 0;

                return `
                    <div class="border border-white/5 rounded-xl overflow-hidden bg-white/5 hover:border-white/10 transition-all ${isCollapsed(playerId) ? 'collapsed' : ''}" id="${playerId}">
                        <div class="p-4 bg-white/5 cursor-pointer hover:bg-white/10 transition-colors" onclick="toggleCollapse('${playerId}')">
                            <div class="flex justify-between items-center mb-3">
                                <div class="flex flex-col gap-0.5">
                                    <a href="${playerLink}" onclick="event.stopPropagation()" class="font-bold f-14 text-blue-400 hover:text-blue-300 flex items-center gap-2 transition-colors">
                                        ${playerName}
                                        <svg class="w-4 h-4 opacity-40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                                    </a>
                                    <span class="f-10 text-blue-400/90 font-bold tracking-tight">${formatActivityDate(pData.last_activity)}</span>
                                </div>
                                <div class="flex items-center justify-center f-12 font-mono text-gray-300 font-bold bg-black/50 px-3 py-1 rounded-md h-7 border border-white/10 shadow-inner">
                                    <span class="text-green-500">${pData.num_locations_checked || 0}</span>&nbsp;/&nbsp;<span class="text-yellow-500">${pData.in_logic?.length || 0}</span>&nbsp;/&nbsp;<span class="text-gray-500">${pData.num_locations_total || 0}</span>
                                </div>
                            </div>
                            <div class="w-full h-2 bg-black/40 rounded-full flex overflow-hidden border border-white/5">
                                <div class="bg-gradient-to-r from-green-600 to-green-400 h-full shadow-[0_0_10px_rgba(34,197,94,0.4)]" style="width: ${donePct}%"></div>
                                <div class="bg-gradient-to-r from-yellow-600 to-yellow-400 h-full" style="width: ${doablePct}%"></div>
                            </div>
                        </div>

                        <div class="collapse-wrapper">
                            <div class="collapse-inner border-t border-white/5">
                                <div class="flex md:hidden border-b border-white/5 bg-black/40">
                                    <button onclick="event.stopPropagation(); setPlayerTab('${playerId}', 'locations')" class="flex-1 py-3 f-12 font-bold uppercase tracking-widest tab-btn ${activeTab === 'locations' ? 'active' : 'text-gray-500'}">REACHABLE</button>
                                    <button onclick="event.stopPropagation(); setPlayerTab('${playerId}', 'items')" class="flex-1 py-3 f-12 font-bold uppercase tracking-widest tab-btn ${activeTab === 'items' ? 'active' : 'text-gray-500'}">INVENTORY</button>
                                </div>
                                <div class="grid grid-cols-1 md:grid-cols-2">
                                    <div class="${activeTab === 'locations' ? 'block' : 'hidden md:block'} p-4 border-b md:border-b-0 md:border-r border-white/5">
                                        <div class="grid grid-cols-1 gap-2">
                                            ${filteredLocs.map(l => `<div class="f-12 text-gray-400 truncate hover:text-yellow-400 transition-colors flex items-center gap-2"><span class="w-1.5 h-1.5 bg-yellow-500 rounded-full shadow-[0_0_5px_rgba(234,179,8,0.5)]"></span>${l}</div>`).join('') || '<div class="text-gray-700 f-12 italic">Nothing currently reachable.</div>'}
                                        </div>
                                    </div>
                                    <div class="${activeTab === 'items' ? 'block' : 'hidden md:block'} p-4 bg-white/5">
                                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-2">
                                            ${sortedItems.map(([n, c]) => `
                                                <div class="flex justify-between bg-white/5 hover:bg-white/10 hover:scale-[1.02] transition-all rounded-lg px-3 py-2 f-12 border border-white/5">
                                                    <span class="truncate text-gray-300 font-bold">${n}</span>
                                                    <span class="text-blue-400 font-black ml-2">x${c}</span>
                                                </div>`).join('') || '<div class="text-gray-700 f-12 italic">Inventory empty.</div>'}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function setPlayerTab(playerId, tab) { PLAYER_TABS[playerId] = tab; render(); }
        fetchData();
        setInterval(fetchData, 60000);
    </script>
</body>
</html>
