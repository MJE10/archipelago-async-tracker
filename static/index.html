<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logic Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #e5e7eb; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .card { background-color: #1e1e1e; border: 1px solid #333; }
        .collapse-content { display: block; }
        .collapsed .collapse-content { display: none; }
        .rotate-icon { transition: transform 0.2s; transform: rotate(0deg); }
        .collapsed .rotate-icon { transform: rotate(-90deg); }
        .btn { transition: all 0.2s; cursor: pointer; border-radius: 0.375rem; }
        
        .tab-btn { border-bottom: 2px solid transparent; }
        .tab-btn.active { border-color: #3b82f6; color: #3b82f6; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #121212; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    </style>
</head>
<body class="p-2 md:p-8">

    <div class="max-w-6xl mx-auto">
        <div class="sticky top-0 z-50 bg-[#121212]/90 backdrop-blur-md pb-4 pt-2">
            <div class="flex flex-col gap-4 bg-[#1e1e1e] p-4 md:p-6 rounded-xl border border-gray-800 shadow-2xl">
                <div class="flex flex-row justify-between items-center">
                    <div>
                        <h1 class="text-xl md:text-3xl font-bold tracking-tight bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">Logic Tracker</h1>
                        <p id="status-text" class="text-[9px] md:text-xs text-gray-500 uppercase tracking-widest">Initializing...</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="collapseAll()" class="btn border border-gray-700 hover:bg-gray-800 p-2 md:px-4 md:py-2 text-[10px] md:text-xs font-semibold text-gray-400">
                            Collapse All
                        </button>
                        <button onclick="globalAction('refresh')" class="btn bg-blue-600 hover:bg-blue-500 p-2 md:px-4 md:py-2 text-[10px] md:text-xs font-semibold">
                            <span class="hidden md:inline">Refresh All</span>
                            <svg class="w-4 h-4 md:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        </button>
                    </div>
                </div>

                <div class="relative">
                    <input type="text" id="global-search" oninput="handleSearch()" placeholder="Filter items/locations..." 
                        class="w-full bg-black/40 border border-gray-700 rounded-lg py-2.5 px-10 text-sm focus:outline-none focus:border-blue-500 text-gray-200">
                    <svg class="w-4 h-4 absolute left-3.5 top-3 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
            </div>
        </div>

        <div id="game-container" class="space-y-4 md:space-y-6 mt-4 pb-20">
            <div class="flex justify-center p-12">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500"></div>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_PREFIX = "logic_v3_";
        const STATUS_EL = document.getElementById('status-text');
        const SEARCH_EL = document.getElementById('global-search');
        let CURRENT_DATA = {};
        let SEARCH_QUERY = "";
        let PLAYER_TABS = {}; 

        /**
         * Date Formatter
         * Converts "Mon, 23 Mar 2026 02:19:00 GMT" to "Monday 3/23/26 at 2:19 AM"
         */
        function formatActivityDate(gmtString) {
            if (!gmtString) return "No activity";
            try {
                const date = new Date(gmtString);
                const dayName = date.toLocaleDateString('en-US', { weekday: 'long' });
                const datePart = date.toLocaleDateString('en-US', { month: 'numeric', day: 'numeric', year: '2-digit' });
                const timePart = date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
                
                return `Last Activity: ${dayName} ${datePart} at ${timePart}`;
            } catch (e) {
                return gmtString; // Fallback
            }
        }

        async function fetchData() {
            try {
                const response = await fetch('/games');
                CURRENT_DATA = await response.json();
                render();
                updateStatus(`Updated: ${new Date().toLocaleTimeString()}`);
            } catch (err) {
                updateStatus("Connection Error", "text-red-500");
            }
        }

        function handleSearch() {
            SEARCH_QUERY = SEARCH_EL.value.toLowerCase();
            render();
        }

        function collapseAll() {
            // Find all visible game and player sections
            const sections = document.querySelectorAll('[id^="g_"], [id^="p_"]');
            sections.forEach(el => {
                el.classList.add('collapsed');
                localStorage.setItem(STORAGE_PREFIX + el.id, 'true');
            });
        }

        function setPlayerTab(playerId, tab) {
            PLAYER_TABS[playerId] = tab;
            render();
        }

        function updateStatus(msg, colorClass = "text-gray-500") {
            STATUS_EL.textContent = msg;
            STATUS_EL.className = `text-[9px] md:text-xs mt-1 uppercase tracking-widest ${colorClass}`;
        }

        function toggleCollapse(id) {
            const element = document.getElementById(id);
            const isCollapsed = element.classList.toggle('collapsed');
            localStorage.setItem(STORAGE_PREFIX + id, isCollapsed);
        }

        function isCollapsed(id) {
            const stored = localStorage.getItem(STORAGE_PREFIX + id);
            return stored === null ? false : stored === 'true';
        }

        function matchesSearch(text) {
            if (!SEARCH_QUERY) return true;
            const words = SEARCH_QUERY.split(/\s+/).filter(w => w.length > 0);
            const lowerText = text.toLowerCase();
            return words.every(word => lowerText.includes(word));
        }

        function render() {
            const container = document.getElementById('game-container');
            container.innerHTML = "";

            for (const [gameName, gamePlayers] of Object.entries(CURRENT_DATA)) {
                const gameId = `g_${btoa(gameName).replace(/[^a-z0-9]/gi, '')}`;
                const playerHTML = renderPlayers(gameName, gamePlayers);
                if (SEARCH_QUERY && playerHTML.trim() === "") continue;

                const section = document.createElement('div');
                section.id = gameId;
                section.className = `card rounded-xl overflow-hidden mb-4 md:mb-6 ${isCollapsed(gameId) ? 'collapsed' : ''}`;
                section.innerHTML = `
                    <div class="flex items-center justify-between p-3 md:p-4 bg-[#252525] border-b border-gray-800 cursor-pointer" onclick="toggleCollapse('${gameId}')">
                        <div class="flex items-center">
                            <svg class="rotate-icon w-4 h-4 mr-2 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            <h2 class="text-base md:text-xl font-bold text-white truncate">${gameName}</h2>
                        </div>
                    </div>
                    <div class="collapse-content p-2 md:p-4 space-y-4 bg-[#1a1a1a]">${playerHTML}</div>
                `;
                container.appendChild(section);
            }
        }

        function renderPlayers(gameName, players) {
            return Object.entries(players).map(([playerName, pData]) => {
                const playerId = `p_${btoa(gameName + playerName).replace(/[^a-z0-9]/gi, '')}`;
                const activeTab = PLAYER_TABS[playerId] || 'locations';
                
                const filteredLocs = pData.in_logic.filter(loc => matchesSearch(loc));
                const filteredItems = Object.entries(pData.items).filter(([n]) => matchesSearch(n));

                if (SEARCH_QUERY && filteredLocs.length === 0 && filteredItems.length === 0) return '';

                const donePct = (pData.num_locations_checked / pData.num_locations_total) * 100;
                const doablePct = (pData.in_logic.length / pData.num_locations_total) * 100;

                return `
                    <div class="border border-gray-800 rounded-lg overflow-hidden bg-black/10 ${isCollapsed(playerId) ? 'collapsed' : ''}" id="${playerId}">
                        <div class="p-3 bg-gray-800/20 cursor-pointer" onclick="toggleCollapse('${playerId}')">
                            <div class="flex justify-between items-start mb-2">
                                <div class="flex flex-col">
                                    <span class="font-bold text-sm md:text-base text-gray-100">${playerName}</span>
                                    <span class="text-[9px] text-blue-400 font-medium">${formatActivityDate(pData.last_activity)}</span>
                                </div>
                                <div class="text-[10px] font-mono text-gray-400 text-right">
                                    <span class="text-green-500">${pData.num_locations_checked}</span>/<span class="text-yellow-500">${pData.in_logic.length}</span>/<span class="text-gray-500">${pData.num_locations_total}</span>
                                </div>
                            </div>
                            <div class="w-full h-1.5 bg-gray-800 rounded-full flex overflow-hidden">
                                <div class="bg-green-500 h-full" style="width: ${donePct}%"></div>
                                <div class="bg-yellow-500 h-full" style="width: ${doablePct}%"></div>
                            </div>
                        </div>

                        <div class="collapse-content border-t border-gray-800/50">
                            <div class="flex md:hidden border-b border-gray-800">
                                <button onclick="event.stopPropagation(); setPlayerTab('${playerId}', 'locations')" class="flex-1 py-2 text-[10px] font-bold uppercase tracking-widest tab-btn ${activeTab === 'locations' ? 'active' : 'text-gray-500'}">Locations (${filteredLocs.length})</button>
                                <button onclick="event.stopPropagation(); setPlayerTab('${playerId}', 'items')" class="flex-1 py-2 text-[10px] font-bold uppercase tracking-widest tab-btn ${activeTab === 'items' ? 'active' : 'text-gray-500'}">Items (${filteredItems.length})</button>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2">
                                <div class="${activeTab === 'locations' ? 'block' : 'hidden md:block'} p-3 md:p-4 border-b md:border-b-0 md:border-r border-gray-800">
                                    <h4 class="hidden md:block text-[9px] uppercase text-yellow-500 font-bold mb-2">Locations</h4>
                                    <div class="grid grid-cols-1 gap-1">
                                        ${filteredLocs.map(l => `<div class="text-[11px] text-gray-400 truncate tracking-tight">• ${l}</div>`).join('') || '<div class="text-gray-600 text-[10px]">None</div>'}
                                    </div>
                                </div>
                                <div class="${activeTab === 'items' ? 'block' : 'hidden md:block'} p-3 md:p-4 bg-black/10">
                                    <h4 class="hidden md:block text-[9px] uppercase text-blue-400 font-bold mb-2">Inventory</h4>
                                    <div class="grid grid-cols-2 md:grid-cols-1 lg:grid-cols-2 gap-1">
                                        ${filteredItems.map(([n, c]) => `
                                            <div class="flex justify-between bg-gray-800/40 rounded px-1.5 py-1 text-[10px] border border-gray-700/30">
                                                <span class="truncate text-gray-300">${n}</span>
                                                <span class="text-blue-400 font-bold ml-1">x${c}</span>
                                            </div>`).join('') || '<div class="text-gray-600 text-[10px]">None</div>'}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        fetchData();
        setInterval(fetchData, 60000);
    </script>
</body>
</html>
